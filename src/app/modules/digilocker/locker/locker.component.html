<!-- SECURITY SCREEN -->
<div *ngIf="!isAuthorized" class="security-screen">
    <div class="security-box">
        <h4>Enter Password</h4>
        <input type="password" class="form-control mt-2" [(ngModel)]="enteredPassword" placeholder="Enter Password">
        <button class="btn btn-primary mt-3 w-100" (click)="checkPassword()">
            Submit
        </button>
        <div *ngIf="wrongPassword" class="text-danger mt-2">
            Incorrect Password
        </div>
    </div>
</div>



<div class="card">
    <div class="modal-body">
        <form [formGroup]="updateform">
            <div class="row align-items-end">
                <div class="col-md-4">
                    <label class="form-label">
                        Document/File Name <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" formControlName="documentname"
                        placeholder="Enter Certificate Name"
                        [ngClass]="{'is-invalid': submitted && f['documentname'].errors}">
                    <div class="invalid-feedback" *ngIf="submitted && f['documentname'].errors?.['required']">
                        Document/File Name required
                    </div>
                </div>
                <div class="col-md-4">
                    <label>
                        Upload Original Documents <span class="text-danger">*</span>
                    </label>
                    <input type="file" accept="image/*,.pdf" class="form-control" (change)="onImageChange($event)"
                        formControlName="upload_documents">
                    <!-- <div *ngIf="review && reviewimg" class="preview-box mt-2">
                        <img [src]="reviewimg" alt="Preview" class="img-fluid">
                    </div>
                    <div *ngIf="review && reviewPdfUrl" class="preview-box mt-2">
                        <iframe [src]="reviewPdfUrl" width="100%" height="200"></iframe>
                    </div> -->
                </div>
                <div class="col-md-1">
                    <button type="button" class="btn btn-primary w-100" (click)="submitfiles()">
                        ADD
                    </button>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-danger" (click)="logout()" title="Logout">
  <i class="bi bi-box-arrow-right"></i> Logout
</button>
                </div>
            </div>
        </form>

    </div>
</div>


<div class="row">
    <div class="col-12">
        <div class="card-body">
            <div class="row toppad" style="background: white;">
                <div class="mat-elevation-z8" #TABLE style="width:100%">
                    <div class="row buttonhide">
                        <div class="col">
                            <mat-form-field class="sea">
                                <mat-label>Search</mat-label>
                                <input matInput (keyup)="applyFilter($event)" placeholder="Ex:Name" #input>
                            </mat-form-field>
                        </div>
                        <div class="col">
                            <div class="btns">
                                <button mat-raised-button class="btn btn-secondary m-1"
                                    (click)="exportTable('ExampleMaterialTable','Leave Management Report')">Excel</button>

                            </div>
                        </div>
                    </div>
                    <div class="example-container">
                        <table mat-table matTableExporter #tab mat-table [dataSource]="dataSource" matSort
                            #exporter="matTableExporter" id="ExampleMaterialTable">
                            <ng-container matColumnDef="i">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass"
                                    style="width:30px"> S.No
                                </th>
                                <td mat-cell *matCellDef="let row; let i=index" class="centre">{{row.i}}</td>
                            </ng-container>
                            <ng-container matColumnDef="documentname">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">
                                    Document Name</th>
                                <td mat-cell *matCellDef="let row" class="centre">
                                    <span class="para">{{row.documentname.toUpperCase()}}</span>
                                </td>
                            </ng-container>

                            <!-- <ng-container matColumnDef="documents">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">
                                    Document/Image
                                </th>
                                <td mat-cell *matCellDef="let element" (click)="imagepopup(element.documents)"
                                    style="cursor:pointer;">
                                    <ng-container *ngIf="isPdf(element.documents); else showImg">
                                        <div class="pdf-thumb">
                                            <i class="bx bxs-file-pdf"></i>
                                            <span>PDF</span>
                                        </div>
                                    </ng-container>
                                    <ng-template #showImg>
                                        <img [src]="element.documents" alt="Document/Image" width="120" height="120"
                                            style="object-fit:cover;border-radius:8px;">
                                    </ng-template>
                                </td>
                            </ng-container> -->
                            <ng-container matColumnDef="documents">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">
                                    Document/Image
                                </th>

                                <td mat-cell *matCellDef="let element">

                                    <!-- If PDF → Direct Link -->
                                    <ng-container *ngIf="isPdf(element.documents); else showImg">
                                        <a [href]="element.documents" target="_blank" class="pdf-link">
                                            <div class="pdf-thumb">
                                                <i class="bx bxs-file-pdf"></i>
                                                <span>View PDF</span>
                                            </div>
                                        </a>
                                    </ng-container>

                                    <!-- If Image → Popup -->
                                    <ng-template #showImg>
                                        <img [src]="element.documents" width="120" height="120"
                                            style="object-fit:cover;border-radius:8px;cursor:pointer;"
                                            (click)="imagepopup(element.documents)">
                                    </ng-template>

                                </td>
                            </ng-container>
                            <ng-container matColumnDef="selectSlno" sticky:true>
                                <th mat-header-cell *matHeaderCellDef>
                                    <div class="cell">
                                        <ng-select [(ngModel)]="reset" class="selectid" appendTo="body"
                                            (change)="columnfilterdata($event, 0)" [searchable]="true"
                                            [clearable]="true">
                                            <ng-option [value]="{key:'i' ,value:item.i}"
                                                *ngFor="let item of clonedata; let int = index">
                                                {{item.i}}
                                            </ng-option>
                                        </ng-select>
                                    </div>
                                </th>
                            </ng-container>
                            <ng-container matColumnDef="select1">
                                <th mat-header-cell *matHeaderCellDef>
                                    <div class="cell">
                                        <ng-select [(ngModel)]="reset" class="select" appendTo="body"
                                            (change)="columnfilterdata($event, 0)" [searchable]="true"
                                            [clearable]="true">
                                            <ng-option [value]="{key:'documentname',value:item.documentname}"
                                                *ngFor="let item of clonedata | removeDuplicateJsonObject : 'documentname'; let int = index">
                                                {{item.documentname}}
                                            </ng-option>
                                        </ng-select>
                                    </div>
                                </th>
                            </ng-container>
                            <ng-container matColumnDef="select2">
                                <th mat-header-cell *matHeaderCellDef>
                                    <div class="cell">
                                        <ng-select [(ngModel)]="reset" class="select" appendTo="body"
                                            (change)="columnfilterdata($event, 0)" [searchable]="true"
                                            [clearable]="true">
                                            <ng-option [value]="{key:'documents',value:item.documents}"
                                                *ngFor="let item of clonedata | removeDuplicateJsonObject : 'documents'; let int = index">
                                                {{item.documents}}
                                            </ng-option>
                                        </ng-select>
                                    </div>
                                </th>
                            </ng-container>
                            <tr mat-header-row *matHeaderRowDef="nextdisplayedColumns;sticky: true"></tr>
                            <tr mat-row *matRowDef="let row; columns: nextdisplayedColumns;sticky: true"></tr>
                            <tr mat-header-row *matHeaderRowDef="selectColumns;sticky: true"
                                class="example-second-header-row" [ngClass]="{'hide': !hideselect}">
                        </table>
                    </div>
                </div>
                <br><br>
            </div>
        </div>
    </div>

</div>


<div class="my-overlay" *ngIf="showSpinner">
    <span class="loader"></span>
    <h5 style="color: white;padding-top: 5px;">Loading</h5>
</div>

<!-- IMAGE POPUP -->
<div class="image-modal" *ngIf="popupImage" (click)="closeImagePopup()">
    <div class="image-wrapper" (click)="$event.stopPropagation()">

        <span class="close-icon" (click)="closeImagePopup()">×</span>

        <img [src]="popupImage" class="large-image">

    </div>
</div>
