<div style="display:flex; gap:20px; flex-wrap:wrap;">
  <div>
    <h3>Local Video</h3>
    <video #localVideo autoplay playsinline muted style="width:320px; border:1px solid #ccc;"></video>
  </div>

  <div>
    <h3>Remote Video</h3>
    <video #remoteVideo autoplay playsinline style="width:320px; border:1px solid #ccc;"></video>
  </div>
</div>

<hr />

<input type="text" placeholder="Enter Room ID" [(ngModel)]="roomId" style="padding:8px; width:200px;" />

<button (click)="joinRoom(roomId)" style="margin-left:10px; padding:8px 12px;">
  Join Room
</button>

<button (click)="startCall()" style="margin-left:10px; padding:8px 12px;">
  Start Call (Send Offer)
</button>
