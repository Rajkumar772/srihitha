<div class="row">
    <div>
        <h3 style="font-family: 'Times New Roman', Times, serif; text-align: center;background: blue; color:white;">
            Medicine-Manufacturers
            <span style="float: right;">
                <a href="javaScript:;" style="color: white;background-color:blue;
                text-decoration: none;font-size: 25px;border-radius: 20px;">

                </a> &nbsp;&nbsp;
            </span>
        </h3>
    </div>

</div>

<br>
<div class="card" style="padding: 1%;">
    <br>

    <div class="card-body" class="gth">
        <form [formGroup]="pharma_manfacturer">
            <div class="row">

                <div class="col-lg-6 mt-1">
                    <div class="form-group">
                        <label>Manufacturer Name<span style="color:red">&nbsp;&nbsp;*</span></label>
                        <input type="text" class="form-control" formControlName="manufacturer_name"
                            placeholder="manufacturer name" oninput="this.value = this.value.toUpperCase()"
                            [ngClass]="{'is-invalid': submitted && valid['manufacturer_name'].errors }" />
                        <div *ngIf="submitted && valid['manufacturer_name'].errors" class="invalid-feedback">
                            <div *ngIf="valid['manufacturer_name'].errors['required']">Manufacturer is required</div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-2 mt-1">
                    <div class="mt-3">
                        <button style="background-color: blue;
                        color: white;
                        width: 98px;
                        height: 38px;
                        font-size: 16px;
                        border: none;
                        border-radius: 5px;" (click)="Submit()">Submit</button>
                    </div>
                </div>
            </div>
            <br>
        </form>
    </div>

</div>

<div class="row">
    <div class="col-12">
        <div class="card-body">
            <div class="row toppad" style="background: white;">
                <div class="mat-elevation-z8" #TABLE style="width:100%">
                    <div class="row buttonhide">
                        <div class="col">
                            <mat-form-field class="sea">
                                <mat-label>Search</mat-label>
                                <input matInput (keyup)="applyFilter($event)" #input>
                            </mat-form-field>
                        </div>
                        <div class="col">
                            <div class="btns">
                                <button mat-raised-button class="btn btn-secondary m-1"
                                    (click)="exporter.exportTable('xlsx', {fileName:'rooms-list', sheet: 'sheet_name', Props: {Author: 'Talha'}})">Excel</button>

                                <!-- <button mat-raised-button class="btn btn-secondary"
                                    (click)="downloadPdf(dataSource)">PDF</button> -->
                            </div>
                        </div>
                    </div>

                    <div class="example-container">
                        <table mat-table matTableExporter #tab mat-table [dataSource]="dataSource" matSort
                            #exporter="matTableExporter" id="ExampleMaterialTable">
                            <ng-container matColumnDef="i">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">S.No
                                </th>
                                <td mat-cell *matCellDef="let row; let i=index" class="centre">{{row.i}}</td>
                            </ng-container>

                            <ng-container matColumnDef="manufacturer_name">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">
                                    Manufacturer Name</th>
                                <td mat-cell *matCellDef="let row" class="centre">
                                    <span class="para">{{row.manufacturer_name}}</span>
                                </td>
                            </ng-container>

                            <ng-container matColumnDef="edit">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="headerclass">
                                    Edit</th>
                                <td mat-cell *matCellDef="let row; let i=index" class="centre"><i
                                        style="font-size: 20px;cursor: pointer;" class="fa fa-pencil"
                                        (click)="editMedicines(editDltTempo,row)"></i></td>
                            </ng-container>

                            <ng-container matColumnDef="select1">
                                <th mat-header-cell *matHeaderCellDef>
                                    <div class="cell">
                                        <ng-select [(ngModel)]="reset" class="selectid" appendTo="body"
                                            (change)="columnfilterdata($event, 0)" [searchable]="true"
                                            [clearable]="true">
                                            <ng-option [value]="{key:'i' ,value:item.i}"
                                                *ngFor="let item of clonedata; let int = index">
                                                {{item.i}}
                                            </ng-option>
                                        </ng-select>
                                    </div>
                                </th>
                            </ng-container>
                            <ng-container matColumnDef="select2">
                                <th mat-header-cell *matHeaderCellDef>
                                    <div class="cell">
                                        <ng-select [(ngModel)]="reset" class="select" appendTo="body"
                                            (change)="columnfilterdata($event, 0)" [searchable]="true"
                                            [clearable]="true">
                                            <ng-option [value]="{key:'manufacturer_name' ,value:item.manufacturer_name}"
                                                *ngFor="let item of clonedata ">
                                                {{item.manufacturer_name}}
                                            </ng-option>
                                        </ng-select>
                                    </div>
                                </th>
                            </ng-container>

                            <tr mat-header-row *matHeaderRowDef="nextdisplayedColumns;sticky: true"></tr>
                            <tr mat-row *matRowDef="let row; columns: nextdisplayedColumns;sticky: true"></tr>
                            <tr mat-header-row *matHeaderRowDef="selectColumns;sticky: true"
                                class="example-second-header-row" [ngClass]="{'hide': !hideselect}">
                        </table>
                    </div>
                </div>
                <br><br>
            </div>
        </div>
    </div>
</div>

<ng-template #editDltTempo let-modal>
    <div class="modal-header">
        <h5 class="modal-title mt-0">Edit Manufacturers Details</h5>
        <button type="button" (click)="modalDismiss()" class="btn-close" aria-hidden="true"></button>
    </div>
    <div class="modal-body">
        <form [formGroup]="editform">
            <div class="row">
                <div class="row">
                    <div class="col-lg-4 mt-1">
                        <div class="form-group">
                            <label>Manufacturer Name<span style="color:red">&nbsp;&nbsp;*</span></label>
                            <input type="text" class="form-control" formControlName="manufacturer_name"
                                placeholder="manufacturer name" oninput="this.value = this.value.toUpperCase()"
                                [ngClass]="{'is-invalid': typesubmit && validEdit['manufacturer_name'].errors }" />
                            <div *ngIf="typesubmit && validEdit['manufacturer_name'].errors" class="invalid-feedback">
                                <div *ngIf="validEdit['manufacturer_name'].errors['required']">Manufacturer is required
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="text-align:center;">
                    <button (click)="updtMdcnssdts()" style="background-color: blue;
                    color: white;
                    width: 98px;
                    height: 38px;
                    font-size: 16px;
                    border: none;
                    border-radius: 5px;">Update</button>&nbsp;
                    <button (click)="dltMdcnsdts()" class="btn btn-danger" style="width: 98px;">Delete</button>
                </div>
            </div>
        </form>
    </div>
</ng-template>

<div class="my-overlay" *ngIf="showSpinner">
    <div class="cusloader"></div>
    <h5 style="color: white;">Please Wait...</h5>
</div>
